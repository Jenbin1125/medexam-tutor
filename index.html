    <style>

            --bg-card: #1a2236;
            --bg-card-alt: #1f2b3f;
            --bg-input: #1f2b3f;
            --border-main: #2d3a50;
            --border-light: #253045;
            --text-primary: rgba(237, 242, 250, 0.92);
            --text-secondary: rgba(196, 210, 230, 0.82);
            --text-muted: rgba(148, 168, 196, 0.6);
            --accent: #5eead4;
            --accent-bg: rgba(94, 234, 212, 0.08);
            --accent-border: rgba(94, 234, 212, 0.25);
            --img-brightness: 0.88;
            --img-saturate: 0.9;
            --header-bg: #0c1322;
            --scrollbar-track: #1a2236;
            --scrollbar-thumb: #2d3a50;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;

        html.dark .bg-slate-50,

        html.dark .border-slate-200,
        html.dark .border-slate-100 {

        }

        html.dark .text-slate-800,
        html.dark .text-slate-700 {

        html.dark .text-slate-600,

        }

        html.dark .text-slate-400,

        }

        html.dark .text-teal-700,

        html.dark .bg-teal-50 {
            background-color: var(--accent-bg) !important;
        }

        html.dark .bg-teal-100 {
            background-color: rgba(94, 234, 212, 0.12) !important;
        }

        html.dark .border-teal-200,
        html.dark .border-teal-400,
        html.dark .border-teal-500 {
            border-color: var(--accent-border) !important;
        }

        html.dark .bg-teal-600 {
            background-color: #2dd4bf !important;
            color: #0f172a !important;
        }

        html.dark .hover\:border-teal-400:hover {
            border-color: var(--accent-border) !important;
        }

        html.dark .hover\:bg-teal-50:hover {
            background-color: var(--accent-bg) !important;
        }

        html.dark .bg-green-100 {
            background-color: rgba(74, 222, 128, 0.1) !important;
        }

        html.dark .border-green-500 {
            border-color: rgba(74, 222, 128, 0.4) !important;
        }

        html.dark .text-green-800,
        html.dark .text-green-600 {
            color: #86efac !important;
        }

        html.dark .bg-green-500 {
            background-color: #22c55e !important;
        }

        html.dark .bg-red-50 {
            background-color: rgba(248, 113, 113, 0.08) !important;
        }

        html.dark .border-red-400,
        html.dark .border-red-300 {
            border-color: rgba(248, 113, 113, 0.35) !important;
        }

        html.dark .text-red-500,
        html.dark .text-red-700,
        html.dark .text-red-600 {
            color: #fca5a5 !important;
        }

        html.dark .bg-red-500 {
            background-color: #ef4444 !important;
        }

        html.dark .bg-yellow-400 {
            background-color: #ca8a04 !important;
        }

        html.dark .bg-amber-500 {
            background-color: #d97706 !important;
        }

        html.dark .bg-amber-100,
        html.dark .bg-amber-50 {
            background-color: rgba(251, 191, 36, 0.08) !important;
        }

        html.dark .border-amber-400,
        html.dark .border-amber-200,
        html.dark .border-amber-100 {
            border-color: rgba(251, 191, 36, 0.25) !important;
        }

        html.dark .text-amber-700,
        html.dark .text-amber-800,
        html.dark .text-amber-600 {
            color: #fbbf24 !important;
        }

        html.dark input,
        html.dark input::placeholder {
            color: var(--text-secondary) !important;
        }

        html.dark input {
            background-color: var(--bg-input) !important;
            border-color: var(--border-main) !important;
        }

        html.dark input:focus {
            border-color: var(--accent) !important;
        }

        html.dark .shadow-sm,
        html.dark .shadow-md,
        html.dark .shadow-lg,
        html.dark .shadow-2xl {
            box-shadow: none !important;
            border: 1px solid var(--border-main);
        }

        html.dark img {
            filter: brightness(var(--img-brightness)) saturate(var(--img-saturate));
            transition: filter 0.3s;
        }

        html.dark .prose {
            color: var(--text-primary);
        }

        html.dark .prose th {
            background-color: var(--bg-card-alt) !important;
            color: var(--text-primary) !important;
        }

        html.dark .prose th,
        html.dark .prose td {
            border-color: var(--border-main) !important;
        }

        html.dark .prose strong {

        /* ── 導覽列數字選題按鈕 ── */
        .jump-bar {
            background: white;
            border: 1px solid #e2e8f0;
        }

        .jump-btn-default {
            background: white;
            color: #475569;
            border: 2px solid #e2e8f0;
        }

        .jump-btn-default:hover {
            border-color: #0d9488;
            color: #0d9488;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(13, 148, 136, 0.15);
        }

        .jump-btn-correct {
            background: #10b981;
            color: white;
            border: 2px solid #059669;
        }

        .jump-btn-incorrect {
            background: #ef4444;
            color: white;
            border: 2px solid #dc2626;
        }

        .jump-btn-viewed {
            background: #f59e0b;
            color: white;
            border: 2px solid #d97706;
        }

        .jump-btn-blind {
            background: #6366f1;
            color: white;
            border: 2px solid #4f46e5;
        }

        html.dark .jump-bar {
            background: #0f172a;
            border-color: #2d3a50;
        }

        html.dark .jump-btn-default {
            background: transparent;
            color: rgba(196, 210, 230, 0.7);
            border-color: #334155;
        }

        html.dark .jump-btn-default:hover {
            border-color: #38bdf8;
            color: #38bdf8;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.15);
        }

        html.dark .jump-btn-correct {
            background: #065f46;
            border-color: #10b981;
        }

        html.dark .jump-btn-incorrect {
            background: #7f1d1d;
            border-color: #ef4444;
        }

        html.dark .jump-btn-viewed {
            background: #78350f;
            border-color: #f59e0b;
        }

        html.dark .jump-btn-blind {
            background: #312e81;
            border-color: #6366f1;
        }

        /* ── 重置測驗按鈕 ── */
        .btn-reset {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
            padding: 0 12px;
            height: 32px;
            background: white;
            color: #64748b;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .btn-reset:hover {
            color: #dc2626;
            border-color: #fca5a5;
            background: #fff5f5;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(220, 38, 38, 0.12);
        }

        .btn-reset:hover .btn-reset-icon {
            transform: rotate(-45deg);
        }

        .btn-reset-icon {
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
        }

        html.dark .btn-reset {
            background: transparent;
            color: rgba(196, 210, 230, 0.6);
            border-color: #334155;
        }

        html.dark .btn-reset:hover {
            color: #fca5a5;
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15);
        }

        /* ── 題目左側題號圓形徽章：淺色模式白底灰框 ── */
        .q-index-badge {
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            color: #64748b;
        }

        /* 深色模式：保留深色樣式 */
        html.dark .q-index-badge {
            background-color: #1e293b !important;
            border-color: transparent !important;
            color: #94a3b8 !important;
        }

        html.dark .bg-gradient-to-br {
            background: linear-gradient(135deg, #0c1322, #111827, #0f2027) !important;
        }

        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .prose th,
        .prose td {
            border: 1px solid var(--border-main);
            padding: 0.75rem 1rem;
            text-align: left;
        }

        .prose th {
            background-color: var(--bg-card-alt);
            font-weight: 600;
            color: var(--text-primary);
        }

        .mermaid {
            display: flex;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid var(--border-main);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin: 1.5rem 0;
            overflow-x: auto;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .mermaid::after {
            content: '🔍 點擊放大';
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .mermaid:hover::after {
            opacity: 1;
        }

        .mermaid-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(15, 23, 42, 0.92);
            animation: fadeIn 0.2s ease-out;
        }

        .mermaid-close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            z-index: 10001;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .mermaid-close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .mermaid-viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
        }

        .mermaid-viewport:active {
            cursor: grabbing;
        }

        .mermaid-viewport .mermaid-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100%;
            min-height: 100%;
        }

        .mermaid-viewport .mermaid-inner svg {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .mermaid-zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10001;
            display: flex;
            gap: 8px;
        }

        .mermaid-zoom-controls button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .mermaid-zoom-controls button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .mermaid-zoom-level {
            position: absolute;
            bottom: 24px;
            left: 20px;
            z-index: 10001;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }

        @keyframes pulse-star {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.3)
            }
        }

        .star-pop {
            animation: pulse-star 0.3s ease-out;
        }

        .theme-toggle {
            transition: transform 0.3s ease;
        }

        .theme-toggle:hover {
            transform: rotate(30deg);
        }
    </style>
</head>

<body>
    <!-- 載入中畫面 -->
    <div id="loading-splash" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#0f172a;flex-direction:column;gap:16px;">
        <div id="splash-spinner" style="width:48px;height:48px;border:3px solid #1e293b;border-top-color:#14b8a6;border-radius:50%;animation:sp .8s linear infinite;"></div>
        <div id="splash-text" style="color:#64748b;font-size:14px;font-family:system-ui,sans-serif;">系統載入中...</div>
        <div id="splash-error" style="display:none;color:#fca5a5;font-size:12px;font-family:monospace;max-width:480px;text-align:center;padding:12px;background:rgba(239,68,68,0.1);border-radius:8px;margin-top:8px;"></div>
        <button id="splash-retry" onclick="window.location.reload()" style="display:none;margin-top:8px;padding:8px 24px;background:#14b8a6;color:white;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;">重新整理</button>
        <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
        // 保險機制：15 秒後若 splash 還在，表示 JS 執行失敗
        window.__splashTimer = setTimeout(function() {
            var el = document.getElementById('loading-splash');
            if (el) {
                document.getElementById('splash-spinner').style.display = 'none';
                document.getElementById('splash-text').textContent = '載入逾時，可能是網路問題或程式錯誤';
                document.getElementById('splash-text').style.color = '#fca5a5';
                document.getElementById('splash-retry').style.display = 'block';
                if (window.__splashErr) {
                    document.getElementById('splash-error').style.display = 'block';
                    document.getElementById('splash-error').textContent = window.__splashErr;
                }
            }
        }, 15000);
        // 全域錯誤捕捉
        window.onerror = function(msg, src, line) {
            window.__splashErr = msg + ' (line ' + line + ')';
            var errEl = document.getElementById('splash-error');
            if (errEl) { errEl.style.display = 'block'; errEl.textContent = window.__splashErr; }
        };
    </script>
    <div id="root"></div>

                nodeIds.filter(Boolean).forEach(nid => {
                    if (!nodeKeywordIds.has(nid)) nodeKeywordIds.set(nid, new Set());
                    nodeKeywordIds.get(nid).add(kw.id);
                });
                if (kw.uids) {

                        if (!uidToKeywords.has(uid)) uidToKeywords.set(uid, new Set());

                    importantKwIds.add(kw.id);

        const MarkdownViewer = ({ content }) => {
            const r = React.useRef(null);
            React.useEffect(() => {
                if (!r.current) return;
                try {
                    const n = r.current.querySelectorAll('.mermaid');
                    n.forEach(x => {
                        x.innerHTML = x.innerHTML.replace(/&gt;/g, '>').replace(/&lt;/g, '<').replace(/&amp;/g, '&');
                    });
                    mermaid.initialize({ startOnLoad: false, theme: 'base', themeVariables: { primaryColor: '#f0fdfa', primaryTextColor: '#0f766e', primaryBorderColor: '#14b8a6', lineColor: '#0d9488' } });
                    mermaid.run({ nodes: n, suppressErrors: true }).then(() => {
                        n.forEach(node => {
                            if (node.dataset.zoomBound) return;
                            node.dataset.zoomBound = 'true';
                            node.addEventListener('click', () => {
                                const svgEl = node.querySelector('svg');
                                if (!svgEl) return;
                                const svgClone = svgEl.cloneNode(true);
                                svgClone.removeAttribute('width');
                                svgClone.removeAttribute('height');
                                svgClone.removeAttribute('style');
                                const vb = svgClone.getAttribute('viewBox');
                                let svgW = 800, svgH = 600;
                                if (vb) { const p = vb.split(/\s+/); svgW = parseFloat(p[2]) || 800; svgH = parseFloat(p[3]) || 600; }
                                const padW = window.innerWidth * 0.9;
                                const padH = window.innerHeight * 0.85;
                                const fitScale = Math.min(padW / svgW, padH / svgH, 2.5);
                                const fitted = Math.round(fitScale * 100) / 100;
                                let curScale = fitted;
                                let panX = 0, panY = 0;
                                let isDragging = false, startX = 0, startY = 0, startPanX = 0, startPanY = 0;
                                svgClone.style.width = (svgW * curScale) + 'px';
                                svgClone.style.height = (svgH * curScale) + 'px';
                                svgClone.style.transition = 'width 0.2s, height 0.2s';
                                const overlay = document.createElement('div');
                                overlay.className = 'mermaid-overlay';
                                const closeBtn = document.createElement('button');
                                closeBtn.className = 'mermaid-close-btn';
                                closeBtn.innerHTML = '✕';
                                const viewport = document.createElement('div');
                                viewport.className = 'mermaid-viewport';
                                const inner = document.createElement('div');
                                inner.className = 'mermaid-inner';
                                inner.appendChild(svgClone);
                                viewport.appendChild(inner);
                                const controls = document.createElement('div');
                                controls.className = 'mermaid-zoom-controls';
                                const btnMinus = document.createElement('button'); btnMinus.textContent = '−';
                                const btnReset = document.createElement('button'); btnReset.textContent = '⟲'; btnReset.style.fontSize = '14px';
                                const btnPlus = document.createElement('button'); btnPlus.textContent = '+';
                                controls.appendChild(btnMinus); controls.appendChild(btnReset); controls.appendChild(btnPlus);
                                const zoomLabel = document.createElement('div');
                                zoomLabel.className = 'mermaid-zoom-level';
                                const updateLabel = () => { zoomLabel.textContent = Math.round(curScale * 100) + '%'; };
                                updateLabel();
                                overlay.appendChild(closeBtn); overlay.appendChild(viewport); overlay.appendChild(controls); overlay.appendChild(zoomLabel);
                                const applyTransform = () => { inner.style.transform = 'translate(' + panX + 'px,' + panY + 'px)'; svgClone.style.width = (svgW * curScale) + 'px'; svgClone.style.height = (svgH * curScale) + 'px'; updateLabel(); };
                                const zoom = (delta) => { curScale = Math.max(0.3, Math.min(4, curScale + delta)); applyTransform(); };
                                btnPlus.addEventListener('click', (e) => { e.stopPropagation(); zoom(0.3); });
                                btnMinus.addEventListener('click', (e) => { e.stopPropagation(); zoom(-0.3); });
                                btnReset.addEventListener('click', (e) => { e.stopPropagation(); curScale = fitted; panX = 0; panY = 0; applyTransform(); });
                                viewport.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX; startY = e.clientY; startPanX = panX; startPanY = panY; });
                                window.addEventListener('mousemove', (e) => { if (!isDragging) return; panX = startPanX + (e.clientX - startX); panY = startPanY + (e.clientY - startY); inner.style.transform = 'translate(' + panX + 'px,' + panY + 'px)'; });
                                window.addEventListener('mouseup', () => { isDragging = false; });
                                viewport.addEventListener('touchstart', (e) => { const t = e.touches[0]; isDragging = true; startX = t.clientX; startY = t.clientY; startPanX = panX; startPanY = panY; }, { passive: true });
                                viewport.addEventListener('touchmove', (e) => { if (!isDragging) return; const t = e.touches[0]; panX = startPanX + (t.clientX - startX); panY = startPanY + (t.clientY - startY); inner.style.transform = 'translate(' + panX + 'px,' + panY + 'px)'; }, { passive: true });
                                viewport.addEventListener('touchend', () => { isDragging = false; });

                                document.body.appendChild(overlay);
                            });
                        });
                    });

        const CircularProgress = ({ completed, total }) => { const pct = total === 0 ? 0 : Math.round((completed / total) * 100); const r = 14; const c = 2 * Math.PI * r; return (<div className="flex items-center gap-2"><span className="text-xs font-bold text-slate-400">{completed}/{total}</span><svg width="36" height="36" className="transform -rotate-90"><circle cx="18" cy="18" r={r} stroke="#f1f5f9" strokeWidth="4" fill="none" /><circle cx="18" cy="18" r={r} stroke="#0d9488" strokeWidth="4" fill="none" strokeDasharray={c} strokeDashoffset={c - (pct / 100) * c} className="transition-all duration-500 ease-out" /></svg></div>) };

                        setError('此帳號的存取權限已到期。如需展延，請聯繫管理員。');

                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400"><Icons.Mail /></div>
                                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSendOtp()} placeholder="name@hospital.org.tw" className="w-full pl-11 pr-4 py-3 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-teal-500 text-slate-700 font-medium" />
                                    </div>
                                </div>
                                <button onClick={handleSendOtp} className="w-full py-3 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-xl transition-colors shadow-md">發送驗證碼</button>

                                {/* ✨ 新增：分隔線與 Google 登入按鈕 */}
                                <div className="relative my-6">
                                    <div className="absolute inset-0 flex items-center">
                                        <div className="w-full border-t border-slate-200"></div>
                                    </div>
                                    <div className="relative flex justify-center text-sm">
                                        <span className="px-3 bg-white text-slate-400 font-bold">或已綁定帳號者</span>
                                    </div>
                                </div>

                                <button
                                    onClick={handleGoogleLogin}
                                    className="w-full py-3 bg-white hover:bg-slate-50 text-slate-700 font-bold rounded-xl transition-colors shadow-sm border-2 border-slate-200 flex items-center justify-center gap-2"
                                >
                                    <Icons.Google />
                                    使用 Google 帳號登入
                                </button>
                            </div>
                        )}
                        {step === 'sending' && (
                            <div className="text-center py-8"><Icons.Loader2 className="w-8 h-8 mx-auto text-teal-600 mb-3" /><p className="text-slate-500 font-medium">驗證中，請稍候...</p></div>
                        )}
                        {step === 'otp' && (
                            <div className="space-y-4">
                                <div className="bg-teal-50 border border-teal-200 rounded-xl p-4 text-center">
                                    <p className="text-teal-800 text-sm font-medium">驗證碼已寄送至</p>
                                    <p className="text-teal-700 font-bold">{email}</p>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-600 mb-2">輸入信件中的驗證碼</label>
                                    <input type="text" value={otp} onChange={e => setOtp(e.target.value.replace(/\D/g, '').slice(0, 8))} onKeyDown={e => e.key === 'Enter' && handleVerifyOtp()} placeholder="請輸入數字驗證碼" maxLength={8} className="w-full text-center text-2xl tracking-[0.3em] py-3 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-teal-500 font-mono text-slate-700" />
                                </div>
                                <button onClick={handleVerifyOtp} className="w-full py-3 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-xl transition-colors shadow-md">驗證登入</button>
                                <button onClick={() => { if (countdown <= 0) { setOtp(''); handleSendOtp(); } }} disabled={countdown > 0} className={`w-full py-2 text-sm font-medium rounded-xl transition-colors ${countdown > 0 ? 'text-slate-400 bg-slate-50' : 'text-teal-600 hover:bg-teal-50'}`}>
                                    {countdown > 0 ? `${countdown} 秒後可重新發送` : '重新發送驗證碼'}
                                </button>
                            </div>
                        )}
                        {error && <div className="mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm font-medium text-center">{error}</div>}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 🏥 主應用程式
        // ==========================================
        function MainApp({ session, onLogout, isDark, toggleTheme }) {
            const userId = session?.user?.id;
            // 檢查是否已綁定 Google
            const [isGoogleLinked, setIsGoogleLinked] = React.useState(false);

            React.useEffect(() => {
                if (session?.user?.identities) {
                    const hasGoogle = session.user.identities.some(id => id.provider === 'google');
                    setIsGoogleLinked(hasGoogle);
                }
            }, [session]);

            // 執行綁定 Google
            const handleLinkGoogle = async () => {
                try {
                    const { error } = await supabase.auth.linkIdentity({
                        provider: 'google',
                        options: {
                            redirectTo: window.location.origin
                        }
                    });

                    if (error) throw error;
                    alert('系統將引導您前往 Google 進行授權...');
                } catch (e) {
                    alert('綁定失敗：' + (e.message || '未知錯誤'));
                }
            };

            // 1. 記憶狀態與防呆解析
            const [activeTab, setActiveTab] = React.useState(() => {
                try { return localStorage.getItem(`medtutor_tab_${userId}`) || 'graph'; } catch { return 'graph'; }
            });
            const [selectedContext, setSelectedContext] = React.useState(() => {
                try {
                    const saved = localStorage.getItem(`medtutor_context_${userId}`);
                    const parsed = saved ? JSON.parse(saved) : null;
                    return parsed || { subject: '', sub: '', category: '', keyword: null };
                } catch { return { subject: '', sub: '', category: '', keyword: null }; }
            });
            // ── qStates 核心欄位提取（同步用，去除 UI 暫態） ──
            const extractCoreState = (states) => {
                const core = {};
                Object.entries(states).forEach(([uid, s]) => {
                    if (!s || (s.status === 'unanswered' && !s.showExpl)) return;
                    core[uid] = {};
                    if (s.answerSelected) core[uid].answerSelected = s.answerSelected;
                    if (s.status && s.status !== 'unanswered') core[uid].status = s.status;
                    if (s.confidence) core[uid].confidence = s.confidence;
                    if (s.answeredAt) core[uid].answeredAt = s.answeredAt;
                    if (s.dept) core[uid].dept = s.dept;
                });
                return core;
            };

            // ── qStates 智慧合併（按 answeredAt 取較新者） ──
            const mergeQStates = (local, cloud) => {
                const merged = { ...local };
                Object.entries(cloud).forEach(([uid, cloudState]) => {
                    const localState = merged[uid];
                    if (!localState) {
                        // 本地沒有，雲端有 → 用雲端的
                        merged[uid] = { ...cloudState, openStates: [true, false, false], showExpl: false, pendingConfidence: false };
                    } else if (cloudState.answeredAt && (!localState.answeredAt || cloudState.answeredAt > localState.answeredAt)) {
                        // 雲端的比較新 → 用雲端的核心欄位，保留本地 UI 狀態
                        merged[uid] = { ...localState, ...cloudState };
                    }
                    // 否則本地的比較新或一樣 → 保留本地的（不動）
                });
                return merged;
            };

            const [qStates, setQStates] = React.useState(() => {
                try {
                    const saved = localStorage.getItem(`medtutor_qStates_${userId}`);
                    const parsed = saved ? JSON.parse(saved) : null;
                    return parsed || {};
                } catch { return {}; }
            });
            const [qStatesSynced, setQStatesSynced] = React.useState(false);

            const [searchQuery, setSearchQuery] = React.useState('');
            const [completedKeywords, setCompletedKeywords] = React.useState(new Set());
            const [selectedQuestions, setSelectedQuestions] = React.useState([]);
            const [loadingQuestions, setLoadingQuestions] = React.useState(false);
            const [starredUids, setStarredUids] = React.useState(new Set());
            const [starredQuestions, setStarredQuestions] = React.useState([]);
            const [loadingStarred, setLoadingStarred] = React.useState(false);
            const [reviewPage, setReviewPage] = React.useState(0);
            const [reviewFilter, setReviewFilter] = React.useState('today');
            const [starredDisplayMode, setStarredDisplayMode] = React.useState('show_answer');
            const [confirmedMastered, setConfirmedMastered] = React.useState(() => {
                try { const s = localStorage.getItem(`medtutor_confirmed_${userId}`); return s ? new Set(JSON.parse(s)) : new Set(); } catch { return new Set(); }
            });
            React.useEffect(() => {
                if (userId && confirmedMastered.size > 0) localStorage.setItem(`medtutor_confirmed_${userId}`, JSON.stringify([...confirmedMastered]));
            }, [confirmedMastered, userId]);
            const confirmMastery = (uid) => { setConfirmedMastered(p => { const n = new Set(p); n.add(uid); return n; }); };
            const [reviewQuestions, setReviewQuestions] = React.useState([]);
            const [loadingReview, setLoadingReview] = React.useState(false);
            const REVIEW_PAGE_SIZE = 5;
            const [isAdmin, setIsAdmin] = React.useState(false);
            const [showAdmin, setShowAdmin] = React.useState(false);
            const [adminEmails, setAdminEmails] = React.useState([]);
            const [newEmail, setNewEmail] = React.useState('');
            // --- 意見回饋 State ---
            const [showFeedbackModal, setShowFeedbackModal] = React.useState(false);
            const [feedbackType, setFeedbackType] = React.useState('question_error');
            const [feedbackContent, setFeedbackContent] = React.useState('');
            const [isSubmittingFeedback, setIsSubmittingFeedback] = React.useState(false);
            const [feedbackMsg, setFeedbackMsg] = React.useState('');

            // --- 進度儀表板 State ---
            const [examDate, setExamDate] = React.useState(null);
            const [dailyQuote] = React.useState(() => getTodayQuote());
            const daysUntilExam = React.useMemo(() => {
                if (!examDate) return null;
                const diff = new Date(examDate).getTime() - Date.now();
                return diff > 0 ? Math.ceil(diff / 86400000) : 0;
            }, [examDate]);
            const importantProgress = React.useMemo(() => {
                const total = prebuiltIndex.importantKwIds.size;
                let completed = 0;
                prebuiltIndex.importantKwIds.forEach(id => { if (completedKeywords.has(id)) completed++; });
                return { completed, total, pct: total > 0 ? Math.round((completed / total) * 100) : 0 };
            }, [completedKeywords]);

            // --- 意見回饋提交邏輯 ---
            const handleFeedbackSubmit = async () => {
                if (!feedbackContent.trim()) {
                    setFeedbackMsg('請填寫回饋內容');
                    return;
                }

                setIsSubmittingFeedback(true);
                setFeedbackMsg('');

                try {
                    const { error } = await supabase.from('user_feedback').insert({
                        user_id: userId,
                        email: session?.user?.email,
                        type: feedbackType,
                        content: feedbackContent,
                        // 系統會依據你的 SQL 設定自動補上 created_at
                    });

                    if (error) throw error;

                    setFeedbackMsg('回饋已送出，感謝您的意見！');

                    // 延遲兩秒後自動關閉彈窗並清空表單
                    setTimeout(() => {
                        setShowFeedbackModal(false);
                        setFeedbackContent('');
                        setFeedbackType('question_error');
                        setFeedbackMsg('');
                    }, 2000);

                } catch (e) {
                    setFeedbackMsg('發送失敗：' + (e.message || '發生未知錯誤'));
                } finally {
                    setIsSubmittingFeedback(false);
                }
            };
            // ── LocalStorage 寫入機制 ──
            React.useEffect(() => {
                if (userId) localStorage.setItem(`medtutor_tab_${userId}`, activeTab);
            }, [activeTab, userId]);

            React.useEffect(() => {
                if (userId && selectedContext) {
                    localStorage.setItem(`medtutor_context_${userId}`, JSON.stringify(selectedContext));
                }
            }, [selectedContext, userId]);

            // ── qStates 儲存：localStorage 即時 + Supabase 防抖同步 ──
            const qStatesSyncRef = React.useRef(null);
            React.useEffect(() => {
                if (!userId || !qStates || Object.keys(qStates).length === 0) return;
                try {
                    // 1. 立即寫入 localStorage（毫秒級回應）
                    const stateToSave = Object.entries(qStates).reduce((acc, [uid, state]) => {
                        if (state && (state.status !== 'unanswered' || state.showExpl)) { acc[uid] = state; }
                        return acc;
                    }, {});
                    localStorage.setItem(`medtutor_qStates_${userId}`, JSON.stringify(stateToSave));
                } catch (e) { console.error("儲存 qStates 到 localStorage 失敗:", e); }

                // 2. 防抖 5 秒後同步到 Supabase（只存核心欄位）
                if (qStatesSyncRef.current) clearTimeout(qStatesSyncRef.current);
                qStatesSyncRef.current = setTimeout(async () => {
                    try {
                        const core = extractCoreState(qStates);
                        await supabase.from('user_progress').upsert({
                            user_id: userId,
                            session_state: core,
                            updated_at: new Date().toISOString()
                        }, { onConflict: 'user_id' });
                        console.log('[Sync] qStates → Supabase ✓', Object.keys(core).length, '題');
                    } catch (e) { console.error('[Sync] qStates → Supabase 失敗:', e); }
                }, 5000);
                return () => { if (qStatesSyncRef.current) clearTimeout(qStatesSyncRef.current); };
            }, [qStates, userId]);

            // ── Supabase 資料載入 ──
            React.useEffect(() => {
                if (!userId) return;
                (async () => {
                    const { data: prog } = await supabase.from('user_progress').select('completed_keywords, session_state').eq('user_id', userId).maybeSingle();
                    if (prog?.completed_keywords) setCompletedKeywords(new Set(prog.completed_keywords));

                    // 背景合併雲端 qStates
                    if (prog?.session_state && typeof prog.session_state === 'object' && Object.keys(prog.session_state).length > 0) {
                        setQStates(prevLocal => {
                            const merged = mergeQStates(prevLocal, prog.session_state);
                            const localCount = Object.keys(prevLocal).filter(k => prevLocal[k]?.answeredAt).length;
                            const cloudCount = Object.keys(prog.session_state).length;
                            const mergedCount = Object.keys(merged).filter(k => merged[k]?.answeredAt).length;
                            if (mergedCount > localCount) {
                                console.log(`[Sync] 雲端合併：本地 ${localCount} 題 + 雲端 ${cloudCount} 題 → 合併後 ${mergedCount} 題`);
                                // 同步更新 localStorage
                                try { localStorage.setItem(`medtutor_qStates_${userId}`, JSON.stringify(merged)); } catch(e) {}
                            }
                            return merged;
                        });
                    }
                    setQStatesSynced(true);

                    const { data: stars } = await supabase.from('user_starred').select('question_uid').eq('user_id', userId);
                    if (stars) setStarredUids(new Set(stars.map(s => s.question_uid)));

                    const { data: adm } = await supabase.from('admin_users').select('id').eq('user_id', userId).maybeSingle();
                    setIsAdmin(!!adm);

                    // 載入國考日期
                    try {
                        const { data: cfg } = await supabase.from('system_config').select('value').eq('key', 'exam_date').maybeSingle();
                        if (cfg?.value) setExamDate(cfg.value);
                    } catch(e) { /* system_config 表尚未建立時不報錯 */ }
                })();
            }, [userId]);

            const saveTimerRef = React.useRef(null);
            React.useEffect(() => {
                if (!userId) return;
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
                saveTimerRef.current = setTimeout(async () => {
                    const arr = [...completedKeywords];
                    await supabase.from('user_progress').upsert({ user_id: userId, completed_keywords: arr, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
                }, 1500);
                return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
            }, [completedKeywords, userId]);

            React.useEffect(() => {
                if (!userId) return;

                // 為當前視窗/分頁生成唯一的 Session ID
                const currentSessionId = crypto.randomUUID();

                // 建立專屬該使用者的私有頻道
                const channel = supabase.channel(`account_activity_${userId}`);

                // 監聽來自其他視窗的登入廣播
                channel.on('broadcast', { event: 'new_login' }, async (payload) => {
                    if (payload.sessionId !== currentSessionId) {
                        // 收到其他視窗的登入通知，強制登出當前視窗
                        alert('⚠️ 偵測到您的帳號已在其他裝置或分頁登入。\n為確保測驗進度安全，本頁面將強制登出。');
                        await onLogout();
                    }
                });

                // 訂閱頻道並在成功後發送自己的登入廣播
                channel.subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await channel.send({
                            type: 'broadcast',
                            event: 'new_login',
                            sessionId: currentSessionId
                        });
                    }
                });

                // 元件卸載時清理頻道
                return () => {
                    supabase.removeChannel(channel);
                };
            }, [userId, onLogout]);

            const toggleStar = async (uid) => {
                const isStarred = starredUids.has(uid);
                const next = new Set(starredUids);
                if (isStarred) {
                    next.delete(uid);
                    await supabase.from('user_starred').delete().eq('user_id', userId).eq('question_uid', uid);
                } else {
                    next.add(uid);
                    await supabase.from('user_starred').upsert({ user_id: userId, question_uid: uid }, { onConflict: 'user_id,question_uid' });
                }
                setStarredUids(next);
            };

            const loadStarredQuestions = async () => {
                if (starredUids.size === 0) { setStarredQuestions([]); return; }
                setLoadingStarred(true);
                try {
                    const { data } = await supabase.from('questions').select('*').in('uid', [...starredUids]);
                    setStarredQuestions(data || []);
                } catch (e) { console.error(e); } finally { setLoadingStarred(false); }
            };

            // ── 智慧複習：計算各分類的 UIDs ──
            const reviewCategories = React.useMemo(() => {
                const now = Date.now();
                const INTERVALS = { myth: 3, blank: 5, lucky: 7, mastered: 30 };
                const PRIORITY = { myth: 0, lucky: 1, blank: 2, mastered: 3 };
                const categories = { myth: [], blank: [], lucky: [], mastered: [], today: [] };

                Object.entries(qStates).forEach(([uid, s]) => {
                    if (!s || !s.confidence || s.status === 'unanswered') return;
                    const qk = getQuadrant(s.status, s.confidence);
                    if (!qk) return;
                    categories[qk].push({ uid, answeredAt: s.answeredAt || 0, quadrant: qk });

                    // 計算是否到期（需要複習）
                    const daysSince = s.answeredAt ? (now - s.answeredAt) / 86400000 : 999;
                    if (daysSince >= INTERVALS[qk]) {
                        categories.today.push({ uid, answeredAt: s.answeredAt || 0, quadrant: qk, priority: PRIORITY[qk] });
                    }
                });

                // 今日複習：所有非真懂的已作答題目（排除已精熟），按優先級排序
                categories.today.sort((a, b) => a.priority - b.priority || a.answeredAt - b.answeredAt);
                // 排除已確認精熟的題目
                categories.today = categories.today.filter(t => !confirmedMastered.has(t.uid));
                categories.mastered = categories.mastered.filter(t => !confirmedMastered.has(t.uid));

                return categories;
            }, [qStates]);

            // ── 載入複習題目 ──
            const reviewSnapshotRef = React.useRef(null);
            const reviewLoadedRef = React.useRef(false);
            React.useEffect(() => {
                if (activeTab !== 'review') { reviewLoadedRef.current = false; return; }
                // 防止同一個 filter 內重複載入（多輪作答不會觸發重新載入）
                const filterKey = `${activeTab}_${reviewFilter}`;
                if (reviewLoadedRef.current === filterKey) return;
                reviewLoadedRef.current = filterKey;
                setReviewPage(0);

                // 取得當前 filter 的 UIDs
                let uids = [];
                if (reviewFilter === 'starred') {
                    uids = [...starredUids];
                } else if (reviewFilter === 'today') {
                    uids = reviewCategories.today.map(t => t.uid);
                } else {
                    uids = (reviewCategories[reviewFilter] || []).map(t => t.uid);
                }

                // 今日複習：重置 qStates 讓題目可重新作答
                if (reviewFilter === 'today' && uids.length > 0) {
                    setQStates(prev => {
                        const next = { ...prev };
                        uids.forEach(uid => {
                            next[uid] = { ...next[uid], answerSelected: null, status: 'unanswered', openStates: [false, false, false], showExpl: false, pendingConfidence: false };
                        });
                        return next;
                    });
                }

                // 快照 UIDs 並載入題目
                reviewSnapshotRef.current = uids;
                if (uids.length === 0) { setReviewQuestions([]); return; }
                setLoadingReview(true);
                (async () => {
                    try {
                        const { data } = await supabase.from('questions').select('*').in('uid', uids);
                        if (reviewFilter === 'today') {
                            const order = new Map(uids.map((u, i) => [u, i]));
                            data?.sort((a, b) => (order.get(a.uid) ?? 999) - (order.get(b.uid) ?? 999));
                        }
                        setReviewQuestions(data || []);
                    } catch (e) { console.error(e); } finally { setLoadingReview(false); }
                })();
            }, [activeTab, reviewFilter]);

            // 切換 filter 時重置載入守衛
            React.useEffect(() => { reviewLoadedRef.current = false; }, [reviewFilter]);

            // ── 1. 改用我們剛寫好的 RPC 函數撈取進階資料 ──
            const loadAdminEmails = async () => {
                const { data, error } = await supabase.rpc('get_admin_user_stats');
                if (!error) setAdminEmails(data || []);
            };

            // ✨ 優化後的 addEmail (加入錯誤捕捉)
            const addEmail = async () => {
                const e = newEmail.trim().toLowerCase();
                if (!e) return;
                const { error } = await supabase.from('allowed_emails').insert({ email: e, created_by: userId });

                if (error) {
                    // 如果錯誤代碼是 23505 代表違反唯一性 (Unique violation)
                    if (error.code === '23505') alert(`新增失敗：${e} 已經在名單中了！`);
                    else alert('新增失敗：' + error.message);
                    return;
                }

                setNewEmail('');
                loadAdminEmails();
            };

            // ── 3. 刪除 Email ──
            const removeEmail = async (id) => {
                await supabase.from('allowed_emails').delete().eq('id', id);
                loadAdminEmails();
            };

            // ── 4. 更新 Email 到期日 ──
            const updateExpireDate = async (id, newDateStr) => {
                // 若有選日期，設定為該日的 23:59:59 (台灣時間)；若清空，則設為 null (永久有效)
                const val = newDateStr ? `${newDateStr} 23:59:59+08` : null;
                const { error } = await supabase.from('allowed_emails').update({ expires_at: val }).eq('id', id);

                if (error) {
                    alert('更新到期日失敗：' + error.message);
                } else {
                    loadAdminEmails(); // 重新載入以更新狀態燈號
                }
            };

            React.useEffect(() => { if (showAdmin) loadAdminEmails(); }, [showAdmin]);

            const getProgress = React.useCallback((nodeId) => {
                const kwIds = prebuiltIndex.nodeKeywordIds.get(nodeId);
                if (!kwIds) return { completed: 0, total: 0 };
                let completed = 0;
                kwIds.forEach(kwId => { if (completedKeywords.has(kwId)) completed++; });
                return { completed, total: kwIds.size };
            }, [completedKeywords]);

            // ── 載入題目（保留已作答記憶） ──
            React.useEffect(() => {
                const fetchDB = async () => {
                    const kw = selectedContext.keyword;
                    if (!kw) return;
                    setLoadingQuestions(true);
                    try {
                        let uids = kw.uids || prebuiltIndex.kwIdToUids.get(kw.id);
                        if (!uids?.length) { setSelectedQuestions([]); return; }
                        const { data } = await supabase.from('questions').select('*').in('uid', uids);
                        setSelectedQuestions(data || []);
                        setQStates(prev => {
                            const next = { ...prev };
                            (data || []).forEach(q => {
                                if (!next[q.uid]) {
                                    next[q.uid] = { answerSelected: null, status: 'unanswered', openStates: [true, false, false], showExpl: false };
                                }
                            });
                            return next;
                        });
                    } catch (e) { console.error(e); } finally { setLoadingQuestions(false); }
                };
                fetchDB();
            }, [selectedContext.keyword]);

            // ── 答題流程：選答案 → 信心評估 → 揭曉結果 ──
            const handleAnswer = (uid, opt, ans) => {
                setQStates(p => ({ ...p, [uid]: { ...p[uid], answerSelected: opt, pendingConfidence: true, _correctAns: ans } }));
            };
            const handleConfidence = (uid, confident) => {
                setQStates(p => {
                    const prev = p[uid];
                    const isCorrect = prev._correctAns?.includes(prev.answerSelected);
                    return { ...p, [uid]: { ...prev, pendingConfidence: false, confidence: confident ? 'sure' : 'guess', status: isCorrect ? 'correct' : 'incorrect', answeredAt: Date.now(), dept: selectedContext.subject || prev.dept } };
                });
            };
            const handleShowAI = (uid) => setQStates(p => ({ ...p, [uid]: { ...p[uid], status: p[uid].status === 'unanswered' ? 'viewed' : p[uid].status, showExpl: true } }));
            const toggleKw = (kwId) => setCompletedKeywords(p => { const n = new Set(p); n.has(kwId) ? n.delete(kwId) : n.add(kwId); return n; });
            const scrollToQ = (uid) => document.getElementById(`q-${uid}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // ── 重置本地記憶與測驗狀態 ──
            const handleResetLocalMemory = () => {
                const confirmMsg = "確定要清除所有「作答紀錄」嗎？\n\n這將會重置您所有的答題狀態與信心評估紀錄（含雲端備份）。\n（請放心：您的「考前複習」收藏與「圖譜單元打勾」進度不會被清除）";

                if (window.confirm(confirmMsg)) {
                    // 1. 清除瀏覽器 LocalStorage
                    localStorage.removeItem(`medtutor_tab_${userId}`);
                    localStorage.removeItem(`medtutor_context_${userId}`);
                    localStorage.removeItem(`medtutor_qStates_${userId}`);

                    // 2. 清除 Supabase 雲端的 session_state
                    supabase.from('user_progress').upsert({
                        user_id: userId,
                        session_state: {},
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'user_id' }).then(() => console.log('[Sync] 雲端 session_state 已清除')).catch(e => console.error(e));

                    // 3. 重新初始化前端作答狀態
                    setQStates(prev => {
                        const reset = {};
                        selectedQuestions.forEach(q => {
                            reset[q.uid] = {
                                answerSelected: null,
                                status: 'unanswered',
                                openStates: [true, false, false],
                                showExpl: false,
                                confidence: null,
                                pendingConfidence: false
                            };
                        });
                        return reset;
                    });

                    // 註：如果您希望學生按完重置後，系統自動跳回「知識圖譜」首頁，
                    // 可以把下面這兩行的註解打開：
                    // setActiveTab('graph');
                    // setSelectedContext({ subject:'', sub:'', category:'', keyword:null });
                }
            };

            // ── 搜尋（防呆空白處理） ──
            const filteredData = React.useMemo(() => {
                if (!searchQuery.trim()) return knowledgeGraphData;
                const lq = searchQuery.toLowerCase().trim().replace(/\s+/g, ' ');
                const match = (kw) => kw.word.toLowerCase().includes(lq) || (kw.aliases && kw.aliases.some(a => a.toLowerCase().includes(lq)));
                return knowledgeGraphData.map(dept => {
                    const nd = { ...dept, children: [], categories: [] };
                    const fc = (cats) => cats.map(cat => ({ ...cat, keywords: cat.keywords.filter(match) })).filter(cat => cat.keywords.length > 0);
                    if (dept.isSubdivided) { dept.children.forEach(sub => { const f = fc(sub.categories); if (f.length > 0) nd.children.push({ ...sub, categories: f }); }); }
                    else nd.categories = fc(dept.categories);
                    return nd;
                }).filter(d => (d.isSubdivided ? d.children.length > 0 : d.categories.length > 0));
            }, [searchQuery]);

            const TreeNode = ({ label, icon, isExpanded, onClick, children, badge, isKeyword, isCompleted, onToggleComplete, isColdNode }) => (
                <div className="mb-1"><div onClick={onClick} className={`flex items-center justify-between p-3 rounded-xl cursor-pointer border transition-all duration-200 ${isExpanded ? 'bg-teal-50 border-teal-200 text-teal-800' : 'border-transparent text-slate-700 hover:-translate-y-0.5 hover:border-slate-200 hover:shadow-md'}`}><div className="flex items-center gap-3">{isKeyword && <button onClick={(e) => { e.stopPropagation(); onToggleComplete(); }} className={`w-5 h-5 rounded border flex items-center justify-center flex-shrink-0 transition-colors ${isCompleted ? 'bg-teal-500 border-teal-500 text-white' : 'border-slate-300 bg-white'}`}>{isCompleted && <Icons.Check className="w-3 h-3" />}</button>}{!isKeyword && icon}<span className={`font-bold ${isCompleted ? 'text-slate-400 line-through decoration-slate-300' : ''} ${isColdNode ? 'text-slate-500 font-medium' : ''}`}>{label}</span></div><div className="flex items-center gap-3">{badge && <span className={`text-xs px-2.5 py-1 rounded-full font-bold ${isCompleted ? 'bg-slate-100 text-slate-400' : isColdNode ? 'bg-slate-100 text-slate-500' : 'bg-teal-100 text-teal-700'}`}>{badge} 題</span>}{children && <Icons.ChevronRight className={`text-slate-400 transition-transform ${isExpanded ? 'rotate-90' : ''}`} />}</div></div>{isExpanded && children && <div className="ml-5 pl-4 border-l-2 border-slate-100 mt-1 pb-2">{children}</div>}</div>
            );

            const renderQuestion = (q, idx, qState, mode = 'explain') => {
                const explJSON = q.ai_explanation;
                const officialAns = q.correct_answer || (explJSON?.level_1?.correct_option || '');
                let explLevels = null;
                if (explJSON && !explJSON.error && explJSON.level_1) {
                    const gO = (o) => explJSON.level_2?.rule_out?.[o] || explJSON.level_2?.rule_out?.[o.toLowerCase()] || "無";
                    explLevels = [
                        `**Pivot Point 核心關鍵**：\n${explJSON.level_1.key_takeaway}\n\n**正確答案**：${explJSON.level_1.correct_option}`,
                        `**機制回顧**：\n${explJSON.level_2?.recall || ''}\n\n**選項分析**：\n- (A) ${gO('A')}\n- (B) ${gO('B')}\n- (C) ${gO('C')}\n- (D) ${gO('D')}`,
                        `**臨床通則**：\n${explJSON.level_3?.general_principles || ''}\n\n\`\`\`mermaid\n${explJSON.level_3?.mermaid_code || ''}\n\`\`\`\n\n**💎 臨床珍珠**：\n> ${explJSON.level_3?.clinical_pearl || ''}`
                    ];
                }
                const st = qState || {};
                const isReview = mode === 'review' || mode === 'review-starred';
                return (
                    <div id={`q-${q.uid}`} key={q.uid} className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 scroll-mt-[105px]">
                        <div className="flex gap-4">
                            {/* 題目左側的大圓形題號 */}
                            <div className="flex-shrink-0 w-8 h-8 q-index-badge font-bold rounded-full flex items-center justify-center">
                                {idx + 1}
                            </div>
                            <div className="flex-1">
                                <div className="flex justify-between items-start mb-2">
                                    <div className="flex items-center gap-2">
                                        <div className="text-xs text-slate-400 font-mono">題號：{q.uid}</div>
                                    </div>
                                    <div className="flex flex-wrap gap-1 justify-end max-w-[50%]">
                                        {[...(prebuiltIndex.uidToKeywords.get(q.uid) || [])].map(tag => (
                                            <span key={tag} className="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md border border-slate-200">#{tag}</span>
                                        ))}
                                    </div>
                                </div>
                                <div className="whitespace-pre-wrap text-slate-800 text-lg leading-relaxed font-medium mb-4">{q.question_content}</div>
                                <SmartImage src={q.img_q} alt={`題目 ${q.uid} 附圖`} maxH="max-h-[500px]" className="my-3 rounded-xl overflow-hidden border border-slate-200 bg-slate-50" />
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                                    {['A', 'B', 'C', 'D'].map(opt => {
                                        const optText = q[`option_${opt.toLowerCase()}`];
                                        const optImg = q[`img_${opt.toLowerCase()}`];
                                        if (!optText && !optImg) return null;
                                        let bs = "bg-white border-2 border-slate-200 text-slate-700 hover:border-teal-400 hover:bg-teal-50";
                                        if (st.answerSelected && st.pendingConfidence) {
                                            if (opt === st.answerSelected) bs = "bg-teal-50 border-2 border-teal-400 text-teal-800 font-bold";
                                            else bs = "bg-slate-50 border-2 border-slate-100 text-slate-400 opacity-50";
                                        } else if (st.answerSelected && !st.pendingConfidence) {
                                            if (officialAns.includes(opt)) bs = "bg-green-100 border-2 border-green-500 text-green-800 font-bold";
                                            else if (opt === st.answerSelected) bs = "bg-red-50 border-2 border-red-400 text-red-700";
                                            else bs = "bg-slate-50 border-2 border-slate-100 text-slate-400 opacity-50";
                                        }
                                        return <button key={opt} disabled={!!st.answerSelected} onClick={() => handleAnswer(q.uid, opt, officialAns)} className={`text-left p-4 rounded-xl transition-all ${bs}`}><span className="font-bold mr-2">({opt})</span> {optText}<SmartImage src={optImg} alt={`選項${opt}`} maxH="max-h-[200px]" className="mt-2" /></button>;
                                    })}
                                </div>

                                {mode === 'review-starred' && (
                                    <div className="flex justify-end mb-4">
                                        <button onClick={() => toggleStar(q.uid)} className="flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm transition-all shadow-sm bg-red-50 border-2 border-red-300 text-red-600 hover:bg-red-100">
                                            <Icons.Star filled className="w-4 h-4" /> 移出資料夾
                                        </button>
                                    </div>
                                )}

                                {/* ── 信心評估提示 ── */}
                                {st.answerSelected && st.pendingConfidence && (
                                    <div className="flex flex-col items-center gap-3 py-4 animate-fade-in">
                                        <p className="text-slate-600 font-bold text-sm">你對這個答案有多少信心？</p>
                                        <div className="flex gap-3">
                                            <button onClick={() => handleConfidence(q.uid, true)} className="px-5 py-2.5 rounded-xl font-bold text-sm border-2 border-teal-400 text-teal-700 bg-teal-50 hover:bg-teal-100 transition-all">💪 我很確定</button>
                                            <button onClick={() => handleConfidence(q.uid, false)} className="px-5 py-2.5 rounded-xl font-bold text-sm border-2 border-slate-300 text-slate-500 bg-slate-50 hover:bg-slate-100 transition-all">🤔 我在猜</button>
                                        </div>
                                    </div>
                                )}

                                {/* ── 答題結果 + 四象限標籤 ── */}
                                {st.answerSelected && !st.pendingConfidence && !st.showExpl && (
                                    <div className="animate-fade-in mb-4">
                                        <div className="flex items-center gap-3 flex-wrap">
                                            {st.status === 'correct' ? <span className="text-green-600 font-bold text-lg flex items-center gap-1"><Icons.Check className="w-5 h-5" />答對了！</span> : <span className="text-red-500 font-bold text-lg">答錯囉，正確答案是 {officialAns}</span>}
                                            {st.confidence && (() => {
                                                const qk = getQuadrant(st.status, st.confidence);
                                                const ql = qk ? Q_LABELS[qk] : null;
                                                return ql ? <span className={`text-xs font-bold px-2.5 py-1 rounded-full border ${ql.cls}`}>{ql.label}</span> : null;
                                            })()}
                                            <button onClick={() => handleShowAI(q.uid)} className="flex items-center gap-2 px-5 py-2.5 bg-slate-800 hover:bg-teal-600 text-white font-semibold rounded-xl transition-all shadow-sm ml-auto"><Icons.Brain /> 觀看 AI 導師解析</button>
                                        </div>
                                        {/* 真懂慶祝 — 在複習模式下答對+確定時顯示 */}
                                        {isReview && mode !== 'review-starred' && st.status === 'correct' && st.confidence === 'sure' && (
                                            <div className="mt-3 p-4 bg-gradient-to-r from-emerald-50 to-teal-50 rounded-xl border border-emerald-200 animate-fade-in">
                                                <div className="flex items-center gap-3">
                                                    <span className="text-2xl">🎉</span>
                                                    <div className="flex-1">
                                                        <p className="text-sm font-bold text-emerald-700">太棒了！這題已經真正掌握了！</p>
                                                        <p className="text-xs text-emerald-600/70 mt-0.5">答對 + 確定 = 真懂。這個知識點已經內化，考場上能穩定輸出。</p>
                                                    </div>
                                                    <button onClick={() => {
                                                        setConfirmedMastered(p => { const n = new Set(p); n.add(q.uid); return n; });
                                                        setReviewQuestions(prev => prev.filter(rq => rq.uid !== q.uid));
                                                    }} className="flex-shrink-0 px-4 py-2 rounded-xl text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition-all shadow-sm">
                                                        ✅ 已精熟，移出複習
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                        {/* 複習後仍答錯 — 溫和鼓勵 */}
                                        {isReview && mode !== 'review-starred' && st.status === 'incorrect' && st.confidence && (
                                            <div className="mt-3 p-3 bg-slate-50 rounded-xl border border-slate-200 animate-fade-in">
                                                <p className="text-xs text-slate-500 leading-relaxed">💪 沒關係，這題會在幾天後再次出現在複習清單中。每多做一次，記憶就更深一層。</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                                {!st.answerSelected && !st.showExpl && <button onClick={() => handleShowAI(q.uid)} className="text-slate-400 hover:text-teal-600 text-sm font-bold underline transition-colors">跳過作答，直接看詳解</button>}
                                {st.showExpl && (
                                    <div className="mt-6 pt-6 border-t border-slate-100 animate-fade-in">
                                        {!explJSON ? <div className="text-amber-600 font-medium p-3 bg-amber-50 rounded-lg">這題的 AI 解析尚未生成喔！</div> :
                                            explJSON.error ? <div className="text-red-500 font-medium p-3 bg-red-50 rounded-lg">AI 解析生成失敗。</div> :
                                                explLevels && (<>
                                                    <div className="inline-block bg-teal-100 text-teal-800 text-sm font-bold px-3 py-1 rounded-full mb-4">🤖 AI 臨床導師漸進式解析</div>
                                                    <LevelCard title="Level 1: 核心觀念即時回饋" content={explLevels[0]} icon={<Icons.Target />} isOpen={st.openStates?.[0]} onToggle={() => { const o = [...st.openStates]; o[0] = !o[0]; setQStates(p => ({ ...p, [q.uid]: { ...p[q.uid], openStates: o } })) }} />
                                                    <LevelCard title="Level 2: 臨床推理與選項排除" content={explLevels[1]} icon={<Icons.Brain />} isOpen={st.openStates?.[1]} onToggle={() => { const o = [...st.openStates]; o[1] = !o[1]; setQStates(p => ({ ...p, [q.uid]: { ...p[q.uid], openStates: o } })) }} />
                                                    <LevelCard title="Level 3: 通則統整與決策流程" content={explLevels[2]} icon={<Icons.BookOpen />} isOpen={st.openStates?.[2]} onToggle={() => { const o = [...st.openStates]; o[2] = !o[2]; setQStates(p => ({ ...p, [q.uid]: { ...p[q.uid], openStates: o } })) }} />
                                                    {!isReview && (
                                                        <div className="flex justify-end mt-4">
                                                            <button onClick={() => toggleStar(q.uid)} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm transition-all shadow-sm ${starredUids.has(q.uid) ? 'bg-amber-100 border-2 border-amber-400 text-amber-700 hover:bg-amber-50' : 'bg-amber-500 hover:bg-amber-600 text-white border-2 border-amber-500'}`}>
                                                                <Icons.Star filled={starredUids.has(q.uid)} className="w-4 h-4" />
                                                                {starredUids.has(q.uid) ? '已收藏（點擊移出）' : '收藏至智慧複習'}
                                                            </button>
                                                        </div>
                                                    )}
                                                </>)}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-slate-900 text-white shadow-md sticky top-0 z-30">
                        {/* 第一行：Logo + 工具列 */}
                        <div className="max-w-4xl mx-auto px-4 py-2 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-br from-teal-400 to-teal-600 p-1.5 rounded-lg shadow"><Icons.Network /></div>
                                <h1 className="text-base font-bold tracking-wide hidden md:block">AI 臨床導師</h1>
                                {daysUntilExam !== null && (
                                    <div className="flex items-center gap-1.5 bg-slate-800/80 px-2.5 py-1 rounded-lg border border-slate-700/50 ml-1">
                                        <span className="text-teal-400 font-black text-sm tabular-nums">{daysUntilExam}</span><span className="text-slate-500 text-[10px] font-bold">天</span>
                                        <div className="w-px h-3.5 bg-slate-700"></div>
                                        <span className="text-slate-400 text-[10px] font-bold">{importantProgress.completed}<span className="text-slate-600">/{importantProgress.total}</span></span>
                                        <span className="text-teal-400 text-[10px] font-bold">({importantProgress.pct}%)</span>
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-1.5">
                                <button onClick={() => setShowFeedbackModal(true)} className="text-slate-400 hover:text-teal-400 p-1.5 rounded-lg hover:bg-slate-800 transition-all hidden sm:flex" title="意見回饋"><Icons.Mail /></button>
                                {isAdmin && <button onClick={() => setShowAdmin(!showAdmin)} className={`p-1.5 rounded-lg transition-colors ${showAdmin ? 'bg-amber-500 text-white' : 'text-slate-400 hover:text-amber-400 hover:bg-slate-700'}`} title="管理員設定"><Icons.Shield /></button>}
                                {!isGoogleLinked ? (
                                    <button onClick={handleLinkGoogle} className="text-xs bg-amber-50 text-amber-700 hover:bg-amber-100 px-2 py-1 rounded-lg flex items-center gap-1 border border-amber-200 whitespace-nowrap" title="綁定 Google 帳號"><Icons.Google /><span className="font-bold hidden sm:inline">未綁定</span></button>
                                ) : (
                                    <div className="text-xs bg-slate-800 text-slate-300 px-2 py-1 rounded-lg flex items-center gap-1 border border-slate-700 cursor-default" title="已綁定 Google"><Icons.Google /><Icons.Check className="w-3.5 h-3.5 text-teal-400 -ml-0.5" /></div>
                                )}
                                <ThemeToggle isDark={isDark} onToggle={toggleTheme} />
                                <div className="w-px h-4 bg-slate-700"></div>
                                <button onClick={onLogout} className="text-slate-400 hover:text-red-400 p-1.5 rounded-lg hover:bg-slate-800 transition-all" title="登出"><Icons.LogOut /></button>
                            </div>
                        </div>
                        {/* 第二行：Tab 導航（左） + 每日一語（右） */}
                        <div className="max-w-4xl mx-auto px-4 pb-2 flex items-center justify-between gap-3">
                            <div className="flex gap-1 bg-slate-800 p-1 rounded-xl flex-shrink-0">
                                {[{ id: 'graph', label: '知識圖譜', icon: <Icons.Network /> }, { id: 'ai-explain', label: '導師解析', icon: <Icons.Brain /> }, { id: 'review', label: '智慧複習', icon: <Icons.BookOpen /> }, { id: 'dashboard', label: '儀表板', icon: <Icons.Target /> }].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-all flex items-center gap-1.5 ${activeTab === tab.id ? 'bg-teal-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`}>
                                        <span className="w-4 h-4 flex items-center justify-center">{tab.icon}</span>
                                        <span className="hidden sm:inline">{tab.label}</span>
                                    </button>
                                ))}
                            </div>
                            <p className="text-slate-500 text-[11px] truncate min-w-0 hidden sm:block italic">「{dailyQuote.text}」</p>
                        </div>
                    </header>

                    {showAdmin && isAdmin && (
                        <div className="max-w-4xl w-full mx-auto p-4 space-y-4">
                            {/* 國考日期設定 */}
                            <div className="bg-teal-50 border border-teal-200 rounded-2xl p-4 animate-fade-in">
                                <h3 className="font-bold text-teal-800 text-sm mb-3 flex items-center gap-2">📅 國考日期設定</h3>
                                <div className="flex items-center gap-3">
                                    <input type="date" value={examDate || ''} onChange={async (e) => {
                                        const val = e.target.value;
                                        setExamDate(val || null);
                                        try { await supabase.from('system_config').upsert({ key: 'exam_date', value: val || null }, { onConflict: 'key' }); } catch(e) { console.error(e); }
                                    }} className="px-3 py-2 border-2 border-teal-200 rounded-xl focus:outline-none focus:border-teal-400 text-sm text-slate-700 bg-white" />
                                    <span className="text-xs text-teal-700">{examDate ? `倒數 ${daysUntilExam} 天` : '尚未設定'}</span>
                                    {examDate && <button onClick={async () => { setExamDate(null); try { await supabase.from('system_config').upsert({ key: 'exam_date', value: null }, { onConflict: 'key' }); } catch(e) {} }} className="text-xs text-red-500 hover:text-red-700 underline">清除</button>}
                                </div>
                            </div>
                            {/* 管理員名單 */}
                            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-6 animate-fade-in">
                                <h2 className="font-bold text-amber-800 mb-4 flex items-center gap-2"><Icons.Shield /> 管理員名單</h2>
                                <div className="flex gap-2 mb-4">
                                    <input type="email" value={newEmail} onChange={e => setNewEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && addEmail()} placeholder="new@hospital.org.tw" className="flex-1 px-4 py-2 border-2 border-amber-200 rounded-xl focus:outline-none focus:border-amber-400 text-sm" />
                                    <button onClick={addEmail} className="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl text-sm">新增</button>
                                </div>

                                const counts = { mastered: 0, lucky: 0, myth: 0, blank: 0 };
                                allStates.forEach(s => { const qk = getQuadrant(s.status, s.confidence); if (qk) counts[qk]++; });

                                const calibrationPct = sureAnswers.length > 0 ? Math.round((sureCorrect / sureAnswers.length) * 100) : 0;

                                const now = Date.now(), weekAgo = now - 7 * 86400000;
                                const weekCount = Object.values(qStates).filter(s => s && s.answeredAt && s.answeredAt > weekAgo).length;

                                let streak = 0;

                                // 科別統計

                                        const dn = dept.name;
                                        const uidSet = new Set();
                                        const mu = (cats) => { cats.forEach(cat => { cat.keywords?.forEach(kw => { kw.uids?.forEach(uid => {
                                            uidSet.add(uid);
                                            if (!uidToDept.has(uid) || bigDepts.has(uidToDept.get(uid))) uidToDept.set(uid, dn);

                                        if (dept.isSubdivided) { dept.children?.forEach(sub => mu(sub.categories || [])); } else { mu(dept.categories || []); }
                                        deptTotalUids[dn] = uidSet.size;

-0.5">值得鞏固：答對但不穩定</div><p className="text-slate-500 text-[11px] leading-relaxed"><strong>{lH.map(d=>st(d.name)).join('、')}</strong> 隔幾天重做一次，把運氣推進到真懂。</p></div></div>}{sT.length>0&&<div className="flex gap-2 items-start bg-emerald-50 rounded-lg p-3 border border-emerald-100"><span className="flex-shrink-0 text-sm">🟢</span><div><div className="text-emerald-600 font-bold text-xs mb-0.5">表現穩定的科目</div><p className="text-slate-500 text-[11px] leading-relaxed"><strong>{sT.map(d=>st(d.name)).join('、')}</strong> 真懂率達標且覆蓋充足，可降低頻率讓時間給弱科。</p></div></div>}</div>);})()}
