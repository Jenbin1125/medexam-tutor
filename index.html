        const THEME_KEY = 'medtutor_theme';
        const getInitialTheme = () => {
            try { const saved = localStorage.getItem(THEME_KEY); if (saved) return saved; } catch { }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        };
        const applyTheme = (theme) => {
            document.documentElement.classList.toggle('dark', theme === 'dark');
            try { localStorage.setItem(THEME_KEY, theme); } catch { }
        };
        applyTheme(getInitialTheme());

        const ThemeToggle = ({ isDark, onToggle }) => (
            <button onClick={onToggle} className="theme-toggle text-slate-400 hover:text-amber-400 p-1.5 rounded-lg hover:bg-slate-700 transition-colors" title={isDark ? '切換淺色模式' : '切換深色模式'}>
                {isDark ? <Icons.Sun /> : <Icons.Moon />}
            </button>
        );

        function App() {
            const [session, setSession] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [isDark, setIsDark] = React.useState(getInitialTheme() === 'dark');

            const toggleTheme = () => {
                const next = !isDark;
                setIsDark(next);
                applyTheme(next ? 'dark' : 'light');
            };

            // 移除載入畫面 + 初始化 session
            React.useEffect(() => {
                const splash = document.getElementById('loading-splash');
                if (splash) splash.remove();
                if (window.__splashTimer) clearTimeout(window.__splashTimer);
                supabase.auth.getSession().then(({ data: { session } }) => { setSession(session); setLoading(false); });
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => { setSession(session); });
                return () => subscription.unsubscribe();
            }, []);

            const handleLogout = async () => { await supabase.auth.signOut(); setSession(null); };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-slate-900"><Icons.Loader2 className="w-10 h-10 text-teal-500" /></div>;
            if (!session) return <LoginScreen onLogin={setSession} isDark={isDark} toggleTheme={toggleTheme} />;
            return <MainApp session={session} onLogout={handleLogout} isDark={isDark} toggleTheme={toggleTheme} />;
        }

        // ==========================================
        // 🛡️ Error Boundary — 防止 JS 錯誤導致整頁白屏
        // ==========================================
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) {
                console.error('[ErrorBoundary]', error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                            <div className="bg-white rounded-2xl border border-slate-200 p-8 max-w-md w-full text-center">
                                <div className="text-4xl mb-4">⚠️</div>
                                <h2 className="text-xl font-bold text-slate-800 mb-2">系統發生非預期錯誤</h2>
                                <p className="text-sm text-slate-500 mb-4">請嘗試重新整理頁面。若問題持續，請透過意見回饋告知管理員。</p>
                                <details className="text-left mb-4">
                                    <summary className="text-xs text-slate-400 cursor-pointer hover:text-slate-600">技術細節</summary>
                                    <pre className="mt-2 text-[11px] text-red-500 bg-red-50 rounded-lg p-3 overflow-auto max-h-32 border border-red-100">{this.state.error?.toString()}</pre>
                                </details>
                                <button onClick={() => window.location.reload()} className="px-6 py-2.5 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-xl transition-colors">
                                    重新整理頁面
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>

</html>
